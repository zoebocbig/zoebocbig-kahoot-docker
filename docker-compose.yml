version: "3.9"
services:
  backend:
    build: ./backend
    container_name: kahoot-backend
    ports:
      - "5000:5000"

  frontend:
    image: nginx:alpine
    container_name: kahoot-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
