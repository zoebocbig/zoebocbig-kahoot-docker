version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"  # accessible par Nginx via le réseau
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5000:80"  # localhost:5000 → Nginx
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
