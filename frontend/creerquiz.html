<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer Quiz</title>
    <link rel="stylesheet" href="css/creerquiz.css">
</head>
<body>
    <div class="container">
        <!-- Colonne gauche type diapo -->
        <div class="sidebar">
            <h2>Mes Quiz</h2>
            <div id="quizList">
                <!-- Les “diapos” seront ici -->
            </div>
            <button id="addBtn">Ajouter</button>
        </div>

        <!-- Contenu principal -->
        <div class="main-content">
            <h1>Créer ton quiz</h1>
            <p>Selectionne un quiz dans la colonne de gauche pour le modifier.</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <h3>Choisis le type de quiz :</h3>
            <button class="modal-btn" data-type="quiz">Quiz</button>
            <button class="modal-btn" data-type="vrai-faux">Vrai ou Faux</button>
        </div>
    </div>

    <script src="js/creerquiz.js"></script>
</body>
</html>
