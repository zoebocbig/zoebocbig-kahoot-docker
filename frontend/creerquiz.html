<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer Quiz</title>
    <link rel="stylesheet" href="creerquiz.css">
</head>
<body>
<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Mes Quiz</h2>
        <div id="quizList"></div>
        <button id="addBtn">Ajouter</button>
    </div>

    <!-- Contenu principal -->
    <div class="main-content" id="mainContent">
        <h1>Créer ton quiz</h1>
        <p>Sélectionne un quiz dans la colonne de gauche pour le modifier.</p>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="closeModal" class="close">&times;</span>
        <h3>Choisis le type de quiz :</h3>
        <button class="modal-btn" data-type="quiz">Quiz</button>
        <button class="modal-btn" data-type="vrai-faux">Vrai ou Faux</button>
    </div>
</div>

<script src="creerquiz.js"></script>
</body>
</html>
